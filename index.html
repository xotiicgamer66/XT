<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XTRIALS - Horror RPG</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=VT323&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --black: #000000;
    --deep-blue: #020818;
    --void: #050a1a;
    --blood: #8b0000;
    --blood-bright: #cc0000;
    --static: #1a1a2e;
    --ghost: #3a4a6b;
    --terminal: #00ff41;
    --dim-terminal: #004d18;
    --amber: #ff8c00;
    --pale: #c8c8d4;
    --ui-bg: rgba(2, 8, 24, 0.95);
  }

  body {
    background: var(--black);
    overflow: hidden;
    font-family: 'Space Mono', monospace;
    color: var(--pale);
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: crosshair;
  }

  /* Game container */
  #game-container {
    display: flex;
    gap: 0;
    background: #000;
    box-shadow: 0 0 50px rgba(0,0,0,0.5);
  }

  #game-wrapper {
    position: relative;
    width: 640px;
    height: 480px;
  }

  #gameCanvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  /* Chat Panel */
  #chat-panel {
    width: 320px;
    height: 480px;
    background: rgba(2, 8, 24, 0.95);
    border-left: 1px solid #1a2a3a;
    display: flex;
    flex-direction: column;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
  }

  #chat-header {
    padding: 8px 12px;
    background: #0a0e1a;
    border-bottom: 1px solid #1a2a3a;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  #chat-title {
    color: var(--terminal);
    font-size: 12px;
    letter-spacing: 2px;
  }

  #chat-users {
    color: var(--dim-terminal);
    font-size: 10px;
  }

  #chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .chat-message {
    border-left: 2px solid var(--dim-terminal);
    padding-left: 8px;
    margin-bottom: 4px;
    word-wrap: break-word;
  }

  .chat-message.system {
    border-left-color: var(--amber);
    color: var(--amber);
    font-style: italic;
  }

  .chat-message.xotiic {
    border-left-color: #ff00ff;
    color: #ff88ff;
    text-shadow: 0 0 5px #ff00ff;
  }

  .chat-username {
    color: var(--terminal);
    font-weight: bold;
    margin-right: 8px;
  }

  .chat-timestamp {
    color: #444;
    font-size: 8px;
    margin-left: 8px;
  }

  .chat-media {
    max-width: 200px;
    max-height: 150px;
    margin-top: 5px;
    border-radius: 4px;
    cursor: pointer;
  }

  .chat-favorite {
    color: #ffd700;
    cursor: pointer;
    font-size: 10px;
    margin-left: 8px;
  }

  #chat-input-area {
    padding: 10px;
    border-top: 1px solid #1a2a3a;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  #chat-input {
    flex: 1;
    background: #000;
    border: 1px solid #2a3a4a;
    color: var(--terminal);
    padding: 6px 10px;
    font-family: inherit;
    font-size: 11px;
    outline: none;
  }

  #chat-input:focus {
    border-color: var(--terminal);
  }

  .chat-btn {
    background: #0a1a2a;
    border: 1px solid #2a3a4a;
    color: var(--pale);
    padding: 6px 10px;
    cursor: pointer;
    font-family: inherit;
    font-size: 10px;
    transition: all 0.2s;
  }

  .chat-btn:hover {
    border-color: var(--terminal);
    color: var(--terminal);
  }

  .media-preview {
    position: absolute;
    bottom: 50px;
    right: 10px;
    background: #000;
    border: 1px solid var(--terminal);
    padding: 5px;
    display: none;
    max-width: 150px;
  }

  /* CRT overlay */
  #crt-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 100;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
    animation: crt-flicker 0.15s infinite;
  }

  @keyframes crt-flicker {
    0%,100% { opacity: 1; }
    92% { opacity: 0.98; }
    93% { opacity: 0.85; }
    94% { opacity: 0.98; }
  }

  /* Rest of CSS same as before but with XTRIALS branding */
  /* ... (include all previous CSS with XTRIALS updates) ... */

  /* Auth screen */
  #auth-screen {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #000;
    z-index: 1000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
  }

  /* XOTIIC badge */
  .xotiic-badge {
    color: #ff00ff;
    text-shadow: 0 0 5px #ff00ff;
    font-size: 10px;
    margin-left: 5px;
  }

  /* Loading animation */
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .loading-dots::after {
    content: '...';
    animation: pulse 1.5s infinite;
  }
</style>
</head>
<body>

<div id="game-container">
  <div id="game-wrapper">
    <canvas id="gameCanvas" width="640" height="480"></canvas>
    <div id="crt-overlay"></div>
    <div id="sanity-vignette"></div>
    <div id="vhs-glitch"></div>
    <div id="jumpscare-overlay">
      <canvas id="jumpscareCanvas" width="640" height="480"></canvas>
    </div>
    
    <!-- UI Overlay -->
    <div id="ui-overlay">
      <div id="hud">
        <div class="stat-bar">
          <span class="stat-label">HEALTH</span>
          <div class="bar-track"><div class="bar-fill" id="health-fill" style="width:100%"></div></div>
          <span class="stat-val" id="health-val">100</span>
        </div>
        <div class="stat-bar">
          <span class="stat-label">SANITY</span>
          <div class="bar-track"><div class="bar-fill" id="sanity-fill" style="width:100%"></div></div>
          <span class="stat-val" id="sanity-val">100</span>
        </div>
      </div>
      <div id="game-time">23:47</div>
      <div id="map-label">STATION K-7</div>
      <div id="entity-meter">
        <div id="entity-label">IT KNOWS YOU</div>
        <div id="entity-track"><div id="entity-fill" style="width:0%"></div></div>
      </div>
      <div id="notifications"></div>
      <div id="hotbar"></div>
    </div>

    <!-- Dialogue box -->
    <div id="dialogue-box">
      <div id="dialogue-speaker"></div>
      <div id="dialogue-text"></div>
      <div id="dialogue-choices"></div>
    </div>

    <!-- Title screen -->
    <div id="title-screen" style="display:none">
      <div id="title-logo">XTRIALS</div>
      <div id="title-sub">PROTOCOL 7.3 // STATION K-7</div>
      <div id="title-buttons">
        <button class="title-btn" onclick="Game.newGame()">NEW TRANSMISSION</button>
        <button class="title-btn" onclick="Game.loadGame()">RESUME</button>
        <button class="title-btn" onclick="Game.showOptions()">OPTIONS</button>
      </div>
      <div id="title-warning">
        WARNING: Contains disturbing content. Death is permanent.
      </div>
    </div>

    <!-- Death screen -->
    <div id="death-screen" style="display:none">
      <div id="death-face">X</div>
      <div id="death-epitaph"></div>
      <div id="death-stats"></div>
      <button class="title-btn" onclick="Game.afterDeath()">BEGIN AGAIN</button>
    </div>

    <!-- Pause menu -->
    <div id="pause-menu" style="display:none">
      <div id="pause-title">// PAUSED //</div>
      <button class="pause-btn" onclick="Game.resume()">RESUME</button>
      <button class="pause-btn" onclick="Game.openJournal()">OPEN JOURNAL</button>
      <button class="pause-btn" onclick="Game.showInventory()">INVENTORY</button>
      <button class="pause-btn" onclick="Game.openCraftingMenu()">CRAFTING</button>
      <button class="pause-btn" onclick="Game.showOptions()">OPTIONS</button>
      <button class="pause-btn" onclick="Game.saveGame()">SAVE GAME</button>
      <button class="pause-btn" onclick="Game.quitToTitle()">QUIT TO TITLE</button>
    </div>

    <!-- Journal panel -->
    <div id="journal-panel" style="display:none">
      <div id="journal-title">FIELD JOURNAL</div>
      <div id="journal-entries"></div>
      <button class="pause-btn" onclick="Game.closeJournal()">CLOSE</button>
    </div>

    <!-- Crafting panel -->
    <div id="crafting-panel" style="display:none">
      <div id="crafting-title">CRAFTING</div>
      <div id="crafting-list"></div>
      <button class="pause-btn" onclick="Game.closeCraftingMenu()">CLOSE</button>
    </div>

    <!-- Loading screen -->
    <div id="loading-screen" style="display:none">
      <div id="loading-text">XTRIALS PROTOCOL INITIALIZING...</div>
    </div>
  </div>

  <!-- Chat Panel -->
  <div id="chat-panel">
    <div id="chat-header">
      <span id="chat-title">GLOBAL CHAT [ROOM 0]</span>
      <span id="chat-users">0 online</span>
    </div>
    <div id="chat-messages"></div>
    <div id="chat-input-area">
      <input type="text" id="chat-input" placeholder="Type message...">
      <button class="chat-btn" id="chat-send-btn">SEND</button>
      <button class="chat-btn" id="chat-gif-btn">GIF</button>
      <button class="chat-btn" id="chat-image-btn">IMG</button>
      <button class="chat-btn" id="chat-voice-btn">🎤</button>
    </div>
    <div id="media-preview" class="media-preview"></div>
  </div>
</div>

<!-- Auth Screen -->
<div id="auth-screen">
  <div style="margin-bottom: 40px; text-align: center;">
    <div style="font-size: 64px; color: #00ff41; letter-spacing: 8px; text-shadow: 0 0 30px #00ff41;">XTRIALS</div>
    <div style="font-size: 12px; color: #4488ff; letter-spacing: 4px; margin-top: -10px;">PROTOCOL 7.3</div>
  </div>
  
  <div style="width: 400px; background: #0a0a14; border: 1px solid #2a2a3a; padding: 30px;">
    <div style="margin-bottom: 20px;">
      <input type="text" id="login-username" placeholder="USERNAME" 
             style="width: 100%; background: #000; border: 1px solid #333; 
                    color: #00ff41; padding: 10px; font-family: inherit;
                    font-size: 14px; outline: none;">
    </div>
    <div style="margin-bottom: 20px;">
      <input type="password" id="login-password" placeholder="PASSWORD" 
             style="width: 100%; background: #000; border: 1px solid #333; 
                    color: #00ff41; padding: 10px; font-family: inherit;
                    font-size: 14px; outline: none;">
    </div>
    
    <div id="auth-error" style="color: #cc0000; font-size: 11px; margin-bottom: 15px; min-height: 20px;"></div>
    
    <button id="login-btn" style="width: 100%; background: #0a2a0a; border: 1px solid #00ff41; 
           color: #00ff41; padding: 10px; cursor: pointer; margin-bottom: 10px;">
      LOGIN
    </button>
    
    <button id="register-btn" style="width: 100%; background: #0a0a2a; border: 1px solid #4488ff; 
           color: #4488ff; padding: 10px; cursor: pointer;">
      NEW TRANSMISSION
    </button>
    
    <div style="margin-top: 20px; font-size: 10px; color: #666; text-align: center;">
      XOTIIC PASS: 40671Mps19*
    </div>
  </div>
</div>

<script>
// XTRIALS - Complete Game Engine with Chat

const API_BASE = window.location.hostname === 'localhost' ? 'http://localhost:8000' : 'https://xtb-pt5r.onrender.com';
const WS_BASE = window.location.hostname === 'localhost' ? 'ws://localhost:8000' : 'wss://xtb-pt5r.onrender.com';

// ─────────────────────────────────────────────────────────────────────────────
// GAME STATE
// ─────────────────────────────────────────────────────────────────────────────

const Game = {
  sessionId: null,
  state: null,
  running: false,
  paused: false,
  currentMap: 'station_k7',
  player: { x: 3, y: 5, facing: 'down', hasFlashlight: false, flashlightOn: false },
  camera: { x: 0, y: 0 },
  keys: {},
  monsters: [],
  audio: null,
  ws: null,
  username: null,
  isXotiic: false,
  xotiicPermissions: {},
  
  // ─────────────────────────────────────────────────────────────────────────
  // AUTHENTICATION
  // ─────────────────────────────────────────────────────────────────────────
  
  async initAuth() {
    const loginBtn = document.getElementById('login-btn');
    const registerBtn = document.getElementById('register-btn');
    const usernameInput = document.getElementById('login-username');
    const passwordInput = document.getElementById('login-password');
    const errorEl = document.getElementById('auth-error');
    
    loginBtn.onclick = async () => {
      const username = usernameInput.value.trim();
      const password = passwordInput.value;
      
      if (!username || !password) {
        errorEl.textContent = 'ALL FIELDS REQUIRED';
        return;
      }
      
      try {
        const res = await fetch(`${API_BASE}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        
        if (res.ok) {
          const data = await res.json();
          this.username = data.user.username;
          this.isXotiic = data.user.is_xotiic;
          this.xotiicPermissions = data.user.permissions || {};
          
          document.getElementById('auth-screen').remove();
          this.showMainMenu();
          
          if (this.isXotiic) {
            this.addNotification('XOTIIC MODE ACTIVATED', 'quest');
          }
        } else {
          errorEl.textContent = 'INVALID CREDENTIALS';
        }
      } catch(e) {
        errorEl.textContent = 'CONNECTION ERROR';
      }
    };
    
    registerBtn.onclick = async () => {
      const username = usernameInput.value.trim();
      const password = passwordInput.value;
      
      if (!username || !password) {
        errorEl.textContent = 'ALL FIELDS REQUIRED';
        return;
      }
      
      if (username.length < 3) {
        errorEl.textContent = 'USERNAME TOO SHORT';
        return;
      }
      
      if (password.length < 4) {
        errorEl.textContent = 'PASSWORD TOO SHORT';
        return;
      }
      
      try {
        const res = await fetch(`${API_BASE}/api/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        
        if (res.ok) {
          const data = await res.json();
          this.username = data.user.username;
          this.isXotiic = data.user.is_xotiic;
          
          document.getElementById('auth-screen').remove();
          this.showMainMenu();
        } else {
          const err = await res.json();
          errorEl.textContent = err.detail || 'REGISTRATION FAILED';
        }
      } catch(e) {
        errorEl.textContent = 'CONNECTION ERROR';
      }
    };
  },
  
  showMainMenu() {
    document.getElementById('title-screen').style.display = 'flex';
    document.getElementById('title-logo').textContent = 'XTRIALS';
    document.getElementById('title-sub').textContent = 'PROTOCOL 7.3 // STATION K-7';
    
    // Add username display
    const userEl = document.createElement('div');
    userEl.style.cssText = 'position: absolute; top: 10px; right: 10px; color: #4488ff; font-size: 10px;';
    userEl.innerHTML = `OPERATOR: ${this.username}${this.isXotiic ? ' <span style="color:#ff00ff">[XOTIIC]</span>' : ''}`;
    document.getElementById('title-screen').appendChild(userEl);
  },
  
  // ─────────────────────────────────────────────────────────────────────────
  // CHAT SYSTEM
  // ─────────────────────────────────────────────────────────────────────────
  
  initChat() {
    const chatInput = document.getElementById('chat-input');
    const sendBtn = document.getElementById('chat-send-btn');
    const gifBtn = document.getElementById('chat-gif-btn');
    const imageBtn = document.getElementById('chat-image-btn');
    const voiceBtn = document.getElementById('chat-voice-btn');
    
    sendBtn.onclick = () => this.sendChatMessage();
    chatInput.onkeypress = (e) => { if (e.key === 'Enter') this.sendChatMessage(); };
    
    gifBtn.onclick = () => {
      const gifUrl = prompt('Enter GIF URL:');
      if (gifUrl) this.sendChatMedia(gifUrl, 'gif');
    };
    
    imageBtn.onclick = () => {
      const fileInput = document.createElement('input');
      fileInput.type = 'file';
      fileInput.accept = 'image/*';
      fileInput.onchange = async (e) => {
        const file = e.target.files[0];
        if (file) await this.uploadAndSendMedia(file);
      };
      fileInput.click();
    };
    
    voiceBtn.onclick = () => {
      if ('webkitSpeechRecognition' in window) {
        const recognition = new webkitSpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.onresult = (event) => {
          const text = event.results[0][0].transcript;
          chatInput.value = text;
          this.sendChatMessage();
        };
        recognition.start();
      } else {
        this.addNotification('Voice input not supported', 'danger');
      }
    };
  },
  
  sendChatMessage() {
    const input = document.getElementById('chat-input');
    const message = input.value.trim();
    if (!message) return;
    
    if (this.ws && this.ws.readyState === WebSocket.OPEN) {
      this.ws.send(JSON.stringify({
        type: 'chat_message',
        username: this.username,
        message: message,
        message_type: 'text',
        room: 'global'
      }));
      input.value = '';
    }
  },
  
  async sendChatMedia(url, type) {
    if (this.ws && this.ws.readyState === WebSocket.OPEN) {
      // Upload media to server
      const formData = new FormData();
      if (type === 'gif') {
        formData.append('media_url', url);
        formData.append('media_type', 'gif');
      }
      
      try {
        const res = await fetch(`${API_BASE}/api/chat/upload`, {
          method: 'POST',
          body: formData
        });
        const data = await res.json();
        
        this.ws.send(JSON.stringify({
          type: 'chat_message',
          username: this.username,
          message: '',
          message_type: type,
          media_url: data.url,
          room: 'global'
        }));
      } catch(e) {
        this.addNotification('Failed to upload media', 'danger');
      }
    }
  },
  
  async uploadAndSendMedia(file) {
    const formData = new FormData();
    formData.append('file', file);
    
    try {
      const res = await fetch(`${API_BASE}/api/chat/upload`, {
        method: 'POST',
        body: formData
      });
      const data = await res.json();
      
      if (this.ws && this.ws.readyState === WebSocket.OPEN) {
        this.ws.send(JSON.stringify({
          type: 'chat_message',
          username: this.username,
          message: '',
          message_type: 'image',
          media_url: data.url,
          room: 'global'
        }));
      }
    } catch(e) {
      this.addNotification('Upload failed', 'danger');
    }
  },
  
  addChatMessage(msg) {
    const container = document.getElementById('chat-messages');
    const messageDiv = document.createElement('div');
    messageDiv.className = `chat-message ${msg.type === 'system' ? 'system' : ''} ${msg.username === 'xotiic' ? 'xotiic' : ''}`;
    
    const timestamp = new Date(msg.timestamp).toLocaleTimeString();
    
    if (msg.type === 'system') {
      messageDiv.innerHTML = `<span style="color:#ff8c00">[SYSTEM]</span> ${msg.message}`;
    } else if (msg.message_type === 'image' || msg.message_type === 'gif') {
      messageDiv.innerHTML = `
        <span class="chat-username">${msg.username}${msg.username === 'xotiic' ? ' <span style="color:#ff00ff">[X]</span>' : ''}</span>
        <span class="chat-timestamp">${timestamp}</span>
        <div><img src="${msg.media_url}" class="chat-media" onclick="window.open('${msg.media_url}','_blank')"></div>
        <span class="chat-favorite" onclick="Game.favoriteMessage('${msg.id}')">⭐ ${msg.favorites?.length || 0}</span>
      `;
    } else if (msg.message_type === 'voice') {
      messageDiv.innerHTML = `
        <span class="chat-username">${msg.username}</span>
        <span class="chat-timestamp">${timestamp}</span>
        <div><audio controls src="${msg.media_url}" style="max-width:200px"></audio></div>
      `;
    } else {
      messageDiv.innerHTML = `
        <span class="chat-username">${msg.username}${msg.username === 'xotiic' ? ' <span style="color:#ff00ff">[X]</span>' : ''}</span>
        <span class="chat-timestamp">${timestamp}</span>
        <span>${this.escapeHtml(msg.message)}</span>
        <span class="chat-favorite" onclick="Game.favoriteMessage('${msg.id}')">⭐ ${msg.favorites?.length || 0}</span>
      `;
    }
    
    container.appendChild(messageDiv);
    container.scrollTop = container.scrollHeight;
    
    // Keep only last 200 messages
    while (container.children.length > 200) {
      container.removeChild(container.firstChild);
    }
  },
  
  async favoriteMessage(messageId) {
    try {
      const res = await fetch(`${API_BASE}/api/chat/favorite?message_id=${messageId}&username=${this.username}`);
      const data = await res.json();
      if (data.success) {
        this.addNotification('Message favorited!', 'quest');
      }
    } catch(e) {}
  },
  
  escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  },
  
  // ─────────────────────────────────────────────────────────────────────────
  // GAME FUNCTIONS
  // ─────────────────────────────────────────────────────────────────────────
  
  async newGame() {
    this.showLoading(true);
    try {
      const res = await fetch(`${API_BASE}/api/new_game?username=${this.username}`);
      const data = await res.json();
      this.sessionId = data.session_id;
      this.state = data.state;
      localStorage.setItem('xtrials_session', this.sessionId);
      await this.startGame();
    } catch(e) {
      console.error('Failed to start game:', e);
      this.sessionId = 'local_' + Date.now();
      this.state = this.getDefaultLocalState();
      await this.startGame();
    }
    this.showLoading(false);
  },
  
  async loadGame() {
    const sid = localStorage.getItem('xtrials_session');
    if (!sid) { this.addNotification('No save found.', 'danger'); return; }
    this.showLoading(true);
    try {
      const res = await fetch(`${API_BASE}/api/load/${sid}`);
      if (!res.ok) throw new Error('No save');
      const data = await res.json();
      this.sessionId = sid;
      this.state = data.state;
      this.player.x = data.state.player.position.x;
      this.player.y = data.state.player.position.y;
      this.currentMap = data.state.player.position.map;
      await this.startGame();
    } catch(e) {
      this.addNotification('SAVE FILE CORRUPTED', 'danger');
    }
    this.showLoading(false);
  },
  
  getDefaultLocalState() {
    return {
      player: { health: 100, max_health: 100, sanity: 100, max_sanity: 100,
        memory_fragments: 0, inventory: [], journal_entries: [] },
      world: { current_map: 'station_k7', in_game_time: '23:47' },
      flags: { entity_awareness: 0 }
    };
  },
  
  async startGame() {
    document.getElementById('title-screen').style.display = 'none';
    document.getElementById('death-screen').style.display = 'none';
    
    this.running = true;
    this.paused = false;
    
    // Init audio
    this.audio = new AudioEngine();
    this.audio.init();
    
    // Connect WebSocket
    this.connectWebSocket();
    
    // Init chat
    this.initChat();
    
    // Start game loop
    this.gameLoop();
    
    // Update HUD
    this.updateHUD();
    
    this.addNotification('XTRIALS PROTOCOL ACTIVE', 'quest');
  },
  
  connectWebSocket() {
    if (!this.sessionId) return;
    try {
      this.ws = new WebSocket(`${WS_BASE}/ws/${this.sessionId}`);
      
      this.ws.onopen = () => {
        console.log('[WS] Connected');
        this.updateUserCount();
      };
      
      this.ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        this.handleWebSocketMessage(msg);
      };
      
      this.ws.onerror = () => console.warn('[WS] Error');
      this.ws.onclose = () => console.log('[WS] Disconnected');
    } catch(e) {
      console.warn('[WS] Not available');
    }
  },
  
  handleWebSocketMessage(msg) {
    switch(msg.type) {
      case 'message':
      case 'system':
        this.addChatMessage(msg);
        break;
      
      case 'chat_history':
        msg.messages.forEach(m => this.addChatMessage(m));
        break;
      
      case 'jumpscare':
        this.triggerJumpscare(msg.scare_type);
        break;
      
      case 'whisper':
        this.addNotification(msg.message, 'danger');
        if (msg.sanity_drain && this.state) {
          this.state.player.sanity = Math.max(0, this.state.player.sanity - msg.sanity_drain);
        }
        break;
      
      case 'help':
        this.addNotification(msg.message, 'quest');
        break;
      
      case 'sanity_modify':
        if (this.state) {
          this.state.player.sanity = Math.max(0, Math.min(this.state.player.max_sanity, 
            this.state.player.sanity + msg.amount));
        }
        break;
      
      case 'monster_spawn':
        this.addNotification(`Something stirs in the darkness...`, 'danger');
        break;
      
      case 'item_grant':
        if (this.state) {
          this.state.player.inventory.push(msg.item);
          this.updateHotbar();
          this.addNotification(`Received: ${msg.item.name}`, 'quest');
        }
        break;
      
      case 'xotiic_response':
        this.addNotification(msg.message, 'quest');
        break;
      
      case 'pong':
        break;
      
      default:
        console.log('[WS] Unknown:', msg.type);
    }
  },
  
  updateUserCount() {
    // Simple ping to check connection
    if (this.ws?.readyState === WebSocket.OPEN) {
      this.ws.send(JSON.stringify({ type: 'ping' }));
    }
  },
  
  // ─────────────────────────────────────────────────────────────────────────
  // GAME LOOP
  // ─────────────────────────────────────────────────────────────────────────
  
  gameLoop() {
    if (!this.running) return;
    requestAnimationFrame(() => this.gameLoop());
    
    if (this.paused) return;
    
    this.handleInput();
    this.updateMonsters();
    this.render();
    this.updateDOM();
  },
  
  handleInput() {
    const now = Date.now();
    if (now - this.lastMoveTime < 180) return;
    
    let dx = 0, dy = 0;
    if (this.keys['ArrowUp'] || this.keys['KeyW']) { dy = -1; this.player.facing = 'up'; }
    else if (this.keys['ArrowDown'] || this.keys['KeyS']) { dy = 1; this.player.facing = 'down'; }
    else if (this.keys['ArrowLeft'] || this.keys['KeyA']) { dx = -1; this.player.facing = 'left'; }
    else if (this.keys['ArrowRight'] || this.keys['KeyD']) { dx = 1; this.player.facing = 'right'; }
    
    if (dx !== 0 || dy !== 0) {
      const nx = this.player.x + dx;
      const ny = this.player.y + dy;
      if (this.canMoveTo(nx, ny)) {
        this.player.x = nx;
        this.player.y = ny;
        this.lastMoveTime = now;
      }
    }
  },
  
  canMoveTo(x, y) {
    if (x < 0 || y < 0 || x >= 20 || y >= 15) return false;
    // Simple collision - walls are blocked
    const map = MAPS[this.currentMap];
    if (!map) return true;
    const tile = map.data[y * 20 + x];
    return tile !== 1; // Not a wall
  },
  
  updateMonsters() {
    // Simple monster AI
    this.monsters.forEach(m => {
      const dx = this.player.x - m.x;
      const dy = this.player.y - m.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      
      if (dist < 3 && Date.now() - (m.lastAttack || 0) > 2000) {
        // Attack player - balanced damage
        const damage = Math.floor(Math.random() * 6) + 2;
        this.state.player.health = Math.max(0, this.state.player.health - damage);
        m.lastAttack = Date.now();
        this.addNotification(`You took ${damage} damage!`, 'danger');
        
        if (this.state.player.health <= 0) {
          this.triggerDeath('monster');
        }
      }
      
      // Move towards player
      if (dist < 8 && Date.now() - (m.lastMove || 0) > 800) {
        const moveX = Math.sign(dx);
        const moveY = Math.sign(dy);
        if (this.canMoveTo(m.x + moveX, m.y)) m.x += moveX;
        else if (this.canMoveTo(m.x, m.y + moveY)) m.y += moveY;
        m.lastMove = Date.now();
      }
    });
  },
  
  render() {
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // Clear
    ctx.fillStyle = '#0a0e1a';
    ctx.fillRect(0, 0, 640, 480);
    
    // Draw grid/tiles
    for (let y = 0; y < 15; y++) {
      for (let x = 0; x < 20; x++) {
        const px = x * 32 - this.camera.x;
        const py = y * 32 - this.camera.y;
        
        if (px > -32 && px < 640 && py > -32 && py < 480) {
          // Simple tile rendering
          ctx.fillStyle = '#1a1e2a';
          ctx.fillRect(px, py, 32, 32);
          ctx.fillStyle = '#2a2e3a';
          ctx.fillRect(px + 1, py + 1, 30, 30);
        }
      }
    }
    
    // Draw player
    const px = this.player.x * 32 - this.camera.x;
    const py = this.player.y * 32 - this.camera.y;
    ctx.fillStyle = '#4488cc';
    ctx.fillRect(px + 8, py + 8, 16, 16);
    ctx.fillStyle = '#88aacc';
    ctx.fillRect(px + 12, py + 4, 8, 8);
    
    // Draw monsters
    this.monsters.forEach(m => {
      const mx = m.x * 32 - this.camera.x;
      const my = m.y * 32 - this.camera.y;
      ctx.fillStyle = '#cc4444';
      ctx.fillRect(mx + 8, my + 8, 16, 16);
    });
    
    // Update camera to follow player
    this.camera.x = this.player.x * 32 - 320;
    this.camera.y = this.player.y * 32 - 240;
    this.camera.x = Math.max(0, Math.min(this.camera.x, 20 * 32 - 640));
    this.camera.y = Math.max(0, Math.min(this.camera.y, 15 * 32 - 480));
  },
  
  updateDOM() {
    if (!this.state) return;
    const p = this.state.player;
    
    document.getElementById('health-fill').style.width = (p.health / p.max_health * 100) + '%';
    document.getElementById('health-val').textContent = Math.floor(p.health);
    
    const sanPct = p.sanity / p.max_sanity * 100;
    document.getElementById('sanity-fill').style.width = sanPct + '%';
    document.getElementById('sanity-val').textContent = Math.floor(p.sanity);
    
    // Entity awareness
    const awareness = this.state.flags?.entity_awareness || 0;
    document.getElementById('entity-fill').style.width = awareness + '%';
  },
  
  updateHUD() {
    document.getElementById('map-label').textContent = 'STATION K-7';
  },
  
  updateHotbar() {
    const hotbar = document.getElementById('hotbar');
    hotbar.innerHTML = '';
    const inv = this.state?.player?.inventory || [];
    
    for (let i = 0; i < Math.min(inv.length, 6); i++) {
      const slot = document.createElement('div');
      slot.className = 'hotbar-slot';
      slot.textContent = inv[i].icon || '?';
      slot.title = inv[i].name;
      hotbar.appendChild(slot);
    }
  },
  
  // ─────────────────────────────────────────────────────────────────────────
  // UI FUNCTIONS
  // ─────────────────────────────────────────────────────────────────────────
  
  addNotification(text, type = '') {
    const container = document.getElementById('notifications');
    const notif = document.createElement('div');
    notif.className = 'notification' + (type ? ` ${type}` : '');
    notif.textContent = `> ${text}`;
    container.appendChild(notif);
    
    setTimeout(() => {
      notif.style.opacity = '0';
      setTimeout(() => notif.remove(), 500);
    }, 4000);
  },
  
  triggerJumpscare(type) {
    const overlay = document.getElementById('jumpscare-overlay');
    const canvas = document.getElementById('jumpscareCanvas');
    const ctx = canvas.getContext('2d');
    
    overlay.classList.add('active');
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, 640, 480);
    ctx.fillStyle = '#000';
    ctx.font = 'bold 48px VT323';
    ctx.textAlign = 'center';
    ctx.fillText('!', 320, 240);
    
    if (this.audio) this.audio.playJumpscare();
    
    setTimeout(() => {
      overlay.classList.remove('active');
    }, 300);
  },
  
  async triggerDeath(cause) {
    this.running = false;
    if (this.audio) this.audio.stopAmbient();
    
    try {
      const res = await fetch(`${API_BASE}/api/death`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: this.sessionId, cause })
      });
      const data = await res.json();
      document.getElementById('death-epitaph').textContent = data.epitaph;
    } catch(e) {
      document.getElementById('death-epitaph').textContent = 'The signal claimed you.';
    }
    
    document.getElementById('death-screen').style.display = 'flex';
    localStorage.removeItem('xtrials_session');
  },
  
  afterDeath() {
    document.getElementById('death-screen').style.display = 'none';
    document.getElementById('title-screen').style.display = 'flex';
    this.sessionId = null;
    this.state = null;
  },
  
  resume() {
    document.getElementById('pause-menu').style.display = 'none';
    this.paused = false;
  },
  
  openJournal() {
    document.getElementById('pause-menu').style.display = 'none';
    const panel = document.getElementById('journal-panel');
    const entries = document.getElementById('journal-entries');
    entries.innerHTML = '';
    
    const journal = this.state?.player?.journal_entries || [];
    if (journal.length === 0) {
      entries.innerHTML = '<div class="journal-entry">No entries yet.</div>';
    } else {
      journal.forEach(entry => {
        const div = document.createElement('div');
        div.className = 'journal-entry';
        div.innerHTML = `<div class="journal-timestamp">${entry.timestamp || '--:--'}</div>${entry.text}`;
        entries.appendChild(div);
      });
    }
    
    panel.style.display = 'flex';
  },
  
  closeJournal() {
    document.getElementById('journal-panel').style.display = 'none';
    document.getElementById('pause-menu').style.display = 'flex';
  },
  
  showInventory() {
    const inv = this.state?.player?.inventory || [];
    if (inv.length === 0) {
      this.addNotification('Inventory empty.');
    } else {
      this.addNotification(`Inventory: ${inv.map(i => i.name).join(', ')}`);
    }
  },
  
  openCraftingMenu() {
    document.getElementById('pause-menu').style.display = 'none';
    const panel = document.getElementById('crafting-panel');
    const list = document.getElementById('crafting-list');
    list.innerHTML = '<div class="journal-entry">Crafting system coming soon...</div>';
    panel.style.display = 'flex';
  },
  
  closeCraftingMenu() {
    document.getElementById('crafting-panel').style.display = 'none';
    document.getElementById('pause-menu').style.display = 'flex';
  },
  
  showOptions() {
    this.addNotification('Options coming soon');
  },
  
  async saveGame() {
    if (!this.sessionId || !this.state) return;
    this.state.player.position = { x: this.player.x, y: this.player.y, map: this.currentMap };
    try {
      await fetch(`${API_BASE}/api/save`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: this.sessionId, state: this.state })
      });
      this.addNotification('Game saved.', 'quest');
    } catch(e) {
      this.addNotification('Save failed.', 'danger');
    }
    this.resume();
  },
  
  quitToTitle() {
    this.running = false;
    if (this.audio) this.audio.stopAmbient();
    document.getElementById('pause-menu').style.display = 'none';
    document.getElementById('title-screen').style.display = 'flex';
  },
  
  showLoading(show) {
    document.getElementById('loading-screen').style.display = show ? 'flex' : 'none';
  },
  
  // Input handlers
  initInput() {
    document.addEventListener('keydown', (e) => {
      this.keys[e.code] = true;
      
      if (e.code === 'Escape') {
        this.paused = !this.paused;
        document.getElementById('pause-menu').style.display = this.paused ? 'flex' : 'none';
      }
      
      if (e.code === 'KeyE') {
        // Interact
        this.tryInteract();
      }
      
      if (e.code === 'KeyF') {
        this.player.flashlightOn = !this.player.flashlightOn;
        this.addNotification(`Flashlight ${this.player.flashlightOn ? 'ON' : 'OFF'}`);
      }
    });
    
    document.addEventListener('keyup', (e) => { this.keys[e.code] = false; });
  },
  
  tryInteract() {
    // Simple interaction - check for monsters to attack
    for (let i = 0; i < this.monsters.length; i++) {
      const m = this.monsters[i];
      const dist = Math.abs(m.x - this.player.x) + Math.abs(m.y - this.player.y);
      if (dist === 1) {
        // Attack monster
        m.hp = (m.hp || 50) - 20;
        this.addNotification(`You attack!`, 'quest');
        if (m.hp <= 0) {
          this.monsters.splice(i, 1);
          this.addNotification(`Enemy defeated!`, 'quest');
        }
        break;
      }
    }
  }
};

// ─────────────────────────────────────────────────────────────────────────────
// AUDIO ENGINE
// ─────────────────────────────────────────────────────────────────────────────

class AudioEngine {
  constructor() {
    this.ctx = null;
    this.enabled = true;
  }
  
  init() {
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    } catch(e) {
      console.warn('Audio not available');
    }
  }
  
  playAmbient() {
    // Simple ambient placeholder
  }
  
  stopAmbient() {
    // Stop ambient
  }
  
  playJumpscare() {
    if (!this.ctx) return;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = 'sawtooth';
    gain.gain.value = 0.3;
    osc.connect(gain);
    gain.connect(this.ctx.destination);
    osc.start();
    osc.stop(this.ctx.currentTime + 0.2);
  }
}

  const container = document.getElementById('game-container');
  const scaleX = window.innerWidth / (640 + 320);
  const scaleY = window.innerHeight / 480;
  const scale = Math.min(scaleX, scaleY, 1);
  container.style.transform = `scale(${scale})`;
  container.style.transformOrigin = 'center center';
}
scaleGame();
